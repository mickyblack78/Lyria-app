<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X200 V4.9: DYNAMIC FOCUS</title>
    <style>
        :root { --accent: #ff3333; --bg: #000; --panel: #111; }
        body { background: var(--bg); color: var(--accent); font-family: monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* DYNAMIC WINDSHIELD */
        #header { height: 45vh; background: #000; border-bottom: 2px solid var(--accent); position: relative; transition: height 0.3s ease; overflow: hidden; flex-shrink: 0; }
        #header.shrunk { height: 15vh; }
        video { width: 100%; height: 100%; object-fit: contain; background: #050000; }

        /* THE STUDIO LANES */
        #studio-main { flex: 1; overflow-x: auto; overflow-y: hidden; position: relative; background: #050000; touch-action: none; }
        .lane { height: 80px; position: relative; width: 8000px; border-bottom: 1px solid #222; transition: height 0.3s ease; }
        .lane.expanded { height: 180px; background: #0a0000; }
        #gutter { height: 40px; width: 8000px; background: #080000; position: relative; border-top: 1px solid #444; border-bottom: 1px solid #444; }
        
        #playhead { position: absolute; top: 0; width: 2px; background: #fff; height: 100%; z-index: 90; pointer-events: none; }
        #needle-handle { position: absolute; top: 50%; transform: translateY(-50%); width: 60px; height: 40px; background: rgba(255,255,255,0.2); border-left: 2px solid #fff; margin-left: -30px; z-index: 95; }

        .clip { position: absolute; height: 90%; top: 5%; background: rgba(255,0,0,0.2); border: 1px solid var(--accent); z-index: 10; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        #footer { height: 120px; background: #000; border-top: 2px solid var(--accent); display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 8px 8px 75px 8px; z-index: 100; }
        .btn { background: #1a0000; color: var(--accent); border: 1px solid #444; font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: var(--accent); color: #000; }

        #lib-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 10px; }
        .lib-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; overflow-y: auto; flex: 1; padding-bottom: 100px; }
        .slot { background: #111; border: 1px solid #333; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 8px; text-align: center; color: #aaa; }
        .slot.selected { border-color: #0f0; color: #0f0; background: #051a05; }
        #inject-controls { height: 80px; display: flex; gap: 10px; padding-top: 10px; margin-bottom: 60px; }
        .inject-btn { flex: 1; background: #300; color: #fff; border: 1px solid var(--accent); font-weight: bold; }
    </style>
</head>
<body onclick="actx.state === 'suspended' && actx.resume()">

<div id="header" onclick="setFocus('video')">
    <video id="windshield" playsinline></video>
</div>

<div id="studio-main">
    <div id="playhead"><div id="needle-handle" ontouchmove="grabNeedle(event)"></div></div>
    <div class="lane" id="lane1" onclick="setFocus(1)"></div>
    <div id="gutter" ontouchmove="grabNeedle(event)"></div>
    <div class="lane" id="lane2" onclick="setFocus(2)"></div>
</div>

<div id="footer">
    <button class="btn" onclick="openLib()">LIB</button>
    <button class="btn" onclick="document.getElementById('f-up').click()">UP</button>
    <button class="btn" id="lock-btn" onclick="state.locked = !state.locked; this.style.background=state.locked?'#f00':'#1a0000'">LOCK</button>
    <button class="btn" onclick="slamMerge()" style="color:#ff0">SLAM</button>
    <button class="btn" onclick="togglePlay()" id="p-btn">PLAY</button>
    <button class="btn" onclick="stop()">PAUSE</button>
    <button class="btn" onclick="reset()">RESET</button>
    <button class="btn" style="color:#444">REC</button>
    <button class="btn" onclick="undo()">UNDO</button>
    <button class="btn" onclick="exportWav()">SAVE</button>
</div>

<div id="lib-overlay">
    <div class="lib-grid" id="lib-view"></div>
    <div id="inject-controls">
        <button class="inject-btn" onclick="inject(1)">LANE 1</button>
        <button class="inject-btn" onclick="inject(2)">LANE 2</button>
        <button class="inject-btn" onclick="closeLib()" style="background:#222;">BACK</button>
    </div>
</div>

<input type="file" id="f-up" hidden accept="audio/*,video/*" onchange="handleUpload(event)">

<script>
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const pxPerSec = 40;
    let state = { playing: false, currentTime: 0, startTime: 0, bar1: null, bar2: null, locked: false, selected: null, focus: 'video' };
    let garage = new Array(10).fill(null); let merged = new Array(10).fill(null);

    function setFocus(target) {
        state.focus = target;
        document.getElementById('header').className = target === 'video' ? '' : 'shrunk';
        document.getElementById('lane1').className = target === 1 ? 'lane expanded' : 'lane';
        document.getElementById('lane2').className = target === 2 ? 'lane expanded' : 'lane';
        if(target !== 'video') { render(target, target === 1 ? state.bar1 : state.bar2); }
    }

    async function handleUpload(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const buffer = await actx.decodeAudioData(ev.target.result);
            let idx = garage.findIndex(x => x === null); if(idx === -1) idx = 0;
            garage[idx] = { name: file.name, buffer, url: URL.createObjectURL(file) };
            openLib();
        };
        reader.readAsArrayBuffer(file);
    }

    function openLib() {
        const view = document.getElementById('lib-view'); view.innerHTML = '';
        [...garage, ...merged].forEach((t, i) => {
            const d = document.createElement('div'); d.className = 'slot';
            d.innerText = t ? `${i<10?'G':'S'}-${i+1}\n${t.name.substring(0,6)}` : 'EMPTY';
            if(t) d.onclick = () => { document.querySelectorAll('.slot').forEach(s=>s.className='slot'); d.className='slot selected'; state.selected = t; };
            view.appendChild(d);
        });
        document.getElementById('lib-overlay').style.display = 'flex';
    }

    function inject(lane) {
        if(!state.selected) return;
        const clip = { ...state.selected, offset: (lane === 2 ? 5 : 0) };
        if(lane === 1) { state.bar1 = clip; if(clip.url) document.getElementById('windshield').src = clip.url; } 
        else { state.bar2 = clip; }
        render(lane, clip); closeLib(); setFocus(lane);
    }

    function render(lane, clip) {
        const el = document.getElementById(`lane${lane}`); el.innerHTML = ''; if(!clip) return;
        const div = document.createElement('div'); div.className = 'clip';
        div.style.width = (clip.buffer.duration * pxPerSec) + "px";
        div.style.left = (clip.offset * pxPerSec) + "px";
        const canv = document.createElement('canvas'); 
        if(state.focus === lane) drawWave(clip.buffer, canv);
        div.appendChild(canv);
        let startX = 0;
        div.ontouchstart = (e) => { startX = e.touches[0].clientX - div.offsetLeft; setFocus(lane); };
        div.ontouchmove = (e) => { let x = e.touches[0].clientX - startX; clip.offset = Math.max(0, x/pxPerSec); div.style.left = x+"px"; };
        el.appendChild(div);
    }

    function drawWave(buffer, canvas) {
        const ctx = canvas.getContext('2d'); const data = buffer.getChannelData(0);
        canvas.width = buffer.duration * pxPerSec; canvas.height = 180;
        const step = Math.ceil(data.length / canvas.width); ctx.fillStyle = '#ff3333';
        for(let i=0; i<canvas.width; i++) {
            let min=1, max=-1; for(let j=0; j<step; j++) { let v = data[i*step+j]; if(v<min) min=v; if(v>max) max=v; }
            ctx.fillRect(i, (1+min)*90, 1, Math.max(1, (max-min)*90));
        }
    }

    function grabNeedle(e) {
        const x = (e.touches ? e.touches[0].clientX : e.clientX) + document.getElementById('studio-main').scrollLeft;
        state.currentTime = x / pxPerSec;
        document.getElementById('playhead').style.left = x + "px";
        document.getElementById('windshield').currentTime = state.currentTime;
    }

    async function slamMerge() {
        if(!state.bar1 || !state.bar2) return;
        const dur = Math.max(state.bar1.buffer.duration, state.bar2.buffer.duration + state.bar2.offset);
        const octx = new OfflineAudioContext(2, 44100 * dur, 44100);
        const s1 = octx.createBufferSource(); s1.buffer = state.bar1.buffer;
        const g1 = octx.createGain(); s1.connect(g1); g1.connect(octx.destination); s1.start(0);
        if(state.locked) { let f = Math.min(1.5, state.bar1.buffer.duration - state.bar2.offset); g1.gain.setValueAtTime(1, state.bar2.offset); g1.gain.linearRampToValueAtTime(0, state.bar2.offset+f); }
        const s2 = octx.createBufferSource(); s2.buffer = state.bar2.buffer; s2.connect(octx.destination); s2.start(state.bar2.offset);
        const res = await octx.startRendering();
        state.bar1 = { buffer: res, offset: 0, name: "MERGED", url: state.bar1.url };
        merged[merged.findIndex(x=>x===null)] = state.bar1; render(1, state.bar1);
        document.getElementById('lane2').innerHTML = ''; state.bar2 = null;
    }

    function togglePlay() {
        if(state.playing) return stop();
        state.playing = true; state.startTime = actx.currentTime;
        const v = document.getElementById('windshield'); v.currentTime = state.currentTime; v.play();
        [state.bar1, state.bar2].forEach(b => { if(b) {
            b.src = actx.createBufferSource(); b.src.buffer = b.buffer; b.src.connect(actx.destination);
            let d = b.offset - state.currentTime; d < 0 ? b.src.start(0, Math.abs(d)) : b.src.start(actx.currentTime + d);
        }});
        requestAnimationFrame(sync);
    }

    function stop() { 
        state.playing = false; state.currentTime += (actx.currentTime - state.startTime);
        document.getElementById('windshield').pause();
        [state.bar1, state.bar2].forEach(b => b?.src?.stop());
    }

    function sync() {
        if(!state.playing) return;
        let now = (actx.currentTime - state.startTime) + state.currentTime;
        document.getElementById('playhead').style.left = (now * pxPerSec) + "px";
        if(state.bar1 && now >= state.bar1.buffer.duration + state.bar1.offset + 0.1) stop();
        else requestAnimationFrame(sync);
    }

    function reset() { state.bar1 = state.bar2 = null; state.currentTime = 0; document.getElementById('lane1').innerHTML = document.getElementById('lane2').innerHTML = ''; document.getElementById('playhead').style.left = '0px'; document.getElementById('windshield').src = ''; }
    function closeLib() { document.getElementById('lib-overlay').style.display = 'none'; state.selected = null; }
</script>
</body>
</html>
