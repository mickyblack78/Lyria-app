<div class="studio">
    <div id="display">X200 // WAVEFORM ENGINE READY</div>
    <div id="sel-stat">SEL: 0.0s - 0.0s</div>

    <div class="timeline-container" id="timeline">
        <div id="sel-bracket" class="bracket" style="left: 0; width: 0; display: none;"></div>

        <div class="lane" id="lane1">
            <canvas id="wave1" style="position:absolute; top:0; left:0; height:100px; width:3000px; opacity:0.6; pointer-events:none;"></canvas>
            <div id="clip1" class="clip" style="left:0; width:0px; border-bottom: 2px solid #f00;">L1: EMPTY</div>
            <input type="range" id="vol1" class="vol-slider" style="left:10px; top:0;" min="0" max="1" step="0.01" value="1">
        </div>

        <div class="lane" id="lane2">
            <canvas id="wave2" style="position:absolute; top:0; left:520px; height:100px; width:3000px; opacity:0.6; pointer-events:none;"></canvas>
            <div id="clip2" class="clip track2" style="left:520px; width:0px; border-bottom: 2px solid #77f;">L2: EMPTY</div>
            <input type="range" id="vol2" class="vol-slider" style="left:520px; top:80px;" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <div class="nudge-panel">
        <label>T2 OFFSET: <span id="offset-val">26.0</span>s</label><br>
        <input type="range" id="nudge-range" min="20" max="32" step="0.1" value="26">
    </div>

    <div class="controls">
        <button class="btn" onclick="document.getElementById('f1').click()">LOAD L1</button>
        <button class="btn" onclick="togglePlay()">PLAY</button>
        <button class="btn" onclick="document.getElementById('f2').click()">LOAD L2</button>
        
        <button class="btn edit-mode" onclick="setSelection()">SET BRACKET</button>
        <button class="btn edit-mode" onclick="copySection(1)">COPY L1</button>
        <button class="btn" onclick="jumpToDrop()">DROP (23s)</button>

        <button class="btn" onclick="stopAll()">STOP</button>
        <button class="btn" onclick="undo()">UNDO</button>
        <button class="btn" onclick="exportMix()">SAVE MIX</button>

        <input type="file" id="f1" hidden onchange="loadTrack(1, this)">
        <input type="file" id="f2" hidden onchange="loadTrack(2, this)">
    </div>
</div>

<script>
    let actx = new (window.AudioContext || window.webkitAudioContext)();
    let clips = { 1: null, 2: null };
    let sources = { 1: null, 2: null };
    let offsets = { 1: 0, 2: 26.0 };
    let selection = { start: 0, end: 5 }; // Default 5s selection

    const pxPerSec = 20;

    // Triggered by "SET BRACKET" Button
    function setSelection() {
        const bracket = document.getElementById('sel-bracket');
        const stat = document.getElementById('sel-stat');
        
        // Cycle selection: 5s, 10s, or Reset
        selection.end = (selection.end >= 10) ? 5 : selection.end + 5;
        
        bracket.style.display = "block";
        bracket.style.width = (selection.end * pxPerSec) + "px";
        stat.innerText = `SEL: 0.0s - ${selection.end}.0s`;
        document.getElementById('display').innerText = "BRACKET SET: " + selection.end + "s";
    }

    async function loadTrack(lane, input) {
        const file = input.files[0];
        if (!file) return;
        const arrayBuf = await file.arrayBuffer();
        clips[lane] = await actx.decodeAudioData(arrayBuf);
        renderWaveform(lane, clips[lane]);
        const block = document.getElementById(`clip${lane}`);
        block.innerText = file.name;
        block.style.width = (clips[lane].duration * pxPerSec) + "px";
        document.getElementById('display').innerText = "LOADED: L" + lane;
    }

    function renderWaveform(lane, buffer) {
        const canvas = document.getElementById(`wave${lane}`);
        const ctx = canvas.getContext('2d');
        const data = buffer.getChannelData(0);
        const step = Math.ceil(data.length / (buffer.duration * pxPerSec));
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = lane === 1 ? "#f00" : "#77f";
        for (let i = 0; i < (buffer.duration * pxPerSec); i++) {
            let min = 1.0, max = -1.0;
            for (let j = 0; j < step; j++) {
                const datum = data[(i * step) + j];
                if (datum < min) min = datum;
                if (datum > max) max = datum;
            }
            ctx.fillRect(i, (1 + min) * 50, 1, Math.max(1, (max - min) * 50));
        }
    }

    function togglePlay(startTimeOffset = 0) {
        stopAll();
        const now = actx.currentTime;
        [1, 2].forEach(lane => {
            if (clips[lane]) {
                sources[lane] = actx.createBufferSource();
                sources[lane].buffer = clips[lane];
                const gain = actx.createGain();
                gain.gain.value = document.getElementById(`vol${lane}`).value;
                sources[lane].connect(gain).connect(actx.destination);
                let delay = offsets[lane] - startTimeOffset;
                if (delay < 0) sources[lane].start(now, Math.abs(delay));
                else sources[lane].start(now + delay);
            }
        });
    }

    function stopAll() {
        [1, 2].forEach(l => { if(sources[l]) { try{sources[l].stop()}catch(e){} } });
    }

    function jumpToDrop() { togglePlay(23.0); }
            </script>
