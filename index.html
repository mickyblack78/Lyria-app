<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X200: V4.5 BULLETPROOF</title>
    <style>
        :root { --accent: #ff3333; --bg: #000; }
        body { background: var(--bg); color: var(--accent); font-family: monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* PINNED TOP */
        #header { height: 100px; background: #0a0000; border-bottom: 2px solid #300; z-index: 100; display: flex; flex-direction: column; }
        #display { height: 25px; text-align: center; font-size: 10px; background: #111; color: #fff; line-height: 25px; border-bottom: 1px solid #222; }
        #lib-scroll { flex: 1; overflow-x: auto; display: flex; padding: 5px; gap: 10px; align-items: center; }
        .lib-item { min-width: 70px; height: 40px; background: #1a0000; border: 1px solid #444; font-size: 9px; display: flex; align-items: center; justify-content: center; text-align: center; }

        /* SCROLLABLE MIDDLE */
        #studio-main { flex: 1; overflow-x: auto; overflow-y: hidden; position: relative; background: #050000; touch-action: none; }
        .lane { height: 140px; position: relative; width: 6000px; border-bottom: 1px solid #111; }
        #gutter { height: 60px; width: 6000px; background: #080000; position: relative; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        
        /* PLAYHEAD & GRABBER */
        #playhead { position: absolute; top: 0; width: 2px; background: #fff; height: 100%; z-index: 90; pointer-events: none; }
        #needle-handle { position: absolute; top: 140px; width: 50px; height: 60px; background: rgba(255,255,255,0.1); border-left: 2px solid #fff; margin-left: -25px; z-index: 95; }

        .clip { position: absolute; height: 120px; top: 10px; background: rgba(255,0,0,0.15); border: 1px solid var(--accent); z-index: 10; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }

        /* PINNED BOTTOM */
        #footer { height: 75px; background: #000; border-top: 2px solid var(--accent); display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 8px; z-index: 100; }
        .btn { background: #111; color: var(--accent); border: 1px solid #444; font-weight: bold; font-size: 9px; text-transform: uppercase; }
        .active-lock { background: var(--accent); color: #000; border-color: #fff; }
    </style>
</head>
<body>

<div id="header">
    <div id="display">X200 V4.5 // SYSTEM STABLE</div>
    <div id="lib-scroll">
        <div id="lib-tracks" style="display:flex; gap:5px;"></div>
        <div id="lib-saves" style="display:flex; gap:5px; border-left: 2px solid #333; padding-left: 10px;"></div>
    </div>
</div>

<div id="studio-main">
    <div id="playhead"><div id="needle-handle" ontouchmove="grabNeedle(event)"></div></div>
    <div class="lane" id="lane1"></div>
    <div id="gutter" ontouchmove="grabNeedle(event)"></div>
    <div class="lane" id="lane2"></div>
</div>

<div id="footer">
    <button class="btn" onclick="document.getElementById('f-upload').click()">UPLOAD</button>
    <button class="btn" id="lock-btn" onclick="toggleLock()">FADE</button>
    <button class="btn" onclick="slamMerge()" style="color:#ff0">SLAM</button>
    <button class="btn" onclick="togglePlay()" id="play-btn">PLAY</button>
    <button class="btn" onclick="exportFinal()">WAV</button>
</div>

<input type="file" id="f-upload" hidden onchange="uploadToLib(event)">

<script>
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const pxPerSec = 40;
    let state = { playing: false, currentTime: 0, startTime: 0, bar1: null, bar2: null, mergeCount: 0, locked: false };
    let downloads = [], merges = new Array(10).fill(null);

    async function uploadToLib(e) {
        const file = e.target.files[0]; if (!file) return;
        const buffer = await actx.decodeAudioData(await file.arrayBuffer());
        downloads.push({ name: file.name, buffer }); updateLibUI();
    }

    function updateLibUI() {
        const tCont = document.getElementById('lib-tracks'); tCont.innerHTML = '';
        downloads.forEach((t) => {
            const d = document.createElement('div'); d.className = 'lib-item';
            d.innerText = t.name.substring(0,8); d.onclick = () => inject(t); tCont.appendChild(d);
        });
    }

    function inject(track) {
        if (!state.bar1) { state.bar1 = { buffer: track.buffer, offset: 0 }; render(1, state.bar1); }
        else { state.bar2 = { buffer: track.buffer, offset: 5 }; render(2, state.bar2); }
    }

    function render(lane, clip) {
        const lEl = document.getElementById(`lane${lane}`); lEl.innerHTML = '';
        const div = document.createElement('div'); div.className = 'clip';
        div.style.width = (clip.buffer.duration * pxPerSec) + "px";
        div.style.left = (clip.offset * pxPerSec) + "px";
        const canv = document.createElement('canvas'); drawWaveform(clip.buffer, canv); div.appendChild(canv);
        let startX = 0;
        div.ontouchstart = (e) => { startX = e.touches[0].clientX - div.offsetLeft; };
        div.ontouchmove = (e) => {
            let x = e.touches[0].clientX - startX;
            clip.offset = Math.max(0, x / pxPerSec); div.style.left = x + "px";
        };
        lEl.appendChild(div);
    }

    function drawWaveform(buffer, canvas) {
        const ctx = canvas.getContext('2d');
        const data = buffer.getChannelData(0);
        const step = Math.ceil(data.length / (buffer.duration * pxPerSec));
        canvas.width = buffer.duration * pxPerSec; canvas.height = 120;
        ctx.fillStyle = '#ff3333';
        for(let i=0; i < canvas.width; i++) {
            let min=1.0, max=-1.0;
            for(let j=0; j<step; j++) {
                let v = data[(i*step)+j];
                if(v<min) min=v; if(v>max) max=v;
            }
            ctx.fillRect(i, (1+min)*60, 1, Math.max(1, (max-min)*60));
        }
    }

    function grabNeedle(e) {
        e.preventDefault();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) + document.getElementById('studio-main').scrollLeft;
        state.currentTime = x / pxPerSec;
        document.getElementById('playhead').style.left = x + "px";
        if (state.playing) { stop(); togglePlay(); }
    }

    function toggleLock() {
        state.locked = !state.locked;
        document.getElementById('lock-btn').className = state.locked ? 'btn active-lock' : 'btn';
    }

    async function slamMerge() {
        if (!state.bar1 || !state.bar2) return;
        const totalDur = Math.max(state.bar1.buffer.duration, state.bar2.buffer.duration + state.bar2.offset);
        const offCtx = new OfflineAudioContext(2, 44100 * totalDur, 44100);
        const s1 = offCtx.createBufferSource(); s1.buffer = state.bar1.buffer;
        const g1 = offCtx.createGain(); s1.connect(g1); g1.connect(offCtx.destination);
        s1.start(0);
        if(state.locked) {
            let fadeTime = Math.min(1.5, state.bar1.buffer.duration - state.bar2.offset);
            if(fadeTime > 0) {
                g1.gain.setValueAtTime(1, state.bar2.offset);
                g1.gain.linearRampToValueAtTime(0, state.bar2.offset + fadeTime);
            }
        }
        const s2 = offCtx.createBufferSource(); s2.buffer = state.bar2.buffer;
        s2.connect(offCtx.destination); s2.start(state.bar2.offset);
        const res = await offCtx.startRendering();
        state.bar1 = { buffer: res, offset: 0 }; state.bar2 = null;
        const idx = state.mergeCount % 10; merges[idx] = res; state.mergeCount++;
        updateMergeUI(); render(1, state.bar1); document.getElementById('lane2').innerHTML = '';
    }

    function updateMergeUI() {
        const mCont = document.getElementById('lib-saves'); mCont.innerHTML = '';
        merges.forEach((m, i) => { if (m) {
            const div = document.createElement('div'); div.className = 'lib-item';
            div.innerText = `S-${i+11}`; div.onclick = () => { state.bar1 = { buffer: m, offset: 0 }; render(1, state.bar1); };
            mCont.appendChild(div);
        }});
    }

    function togglePlay() {
        if (state.playing) { stop(); return; }
        state.playing = true; state.startTime = actx.currentTime;
        [state.bar1, state.bar2].forEach(b => { if (b) {
            b.source = actx.createBufferSource(); b.source.buffer = b.buffer; b.source.connect(actx.destination);
            let d = b.offset - state.currentTime;
            d < 0 ? b.source.start(0, Math.abs(d)) : b.source.start(actx.currentTime + d);
        }});
        document.getElementById('play-btn').innerText = "STOP";
        requestAnimationFrame(sync);
    }

    function stop() {
        state.playing = false; state.currentTime += (actx.currentTime - state.startTime);
        [state.bar1, state.bar2].forEach(b => { if (b?.source) b.source.stop(); });
        document.getElementById('play-btn').innerText = "PLAY";
    }

    function sync() {
        if (!state.playing) return;
        let now = (actx.currentTime - state.startTime) + state.currentTime;
        document.getElementById('playhead').style.left = (now * pxPerSec) + "px";
        requestAnimationFrame(sync);
    }

    function exportFinal() {
        if (!state.bar1) return;
        const blob = new Blob([bufferToWav(state.bar1.buffer)], {type:'audio/wav'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = "X200_FINAL.wav"; a.click();
    }

    function bufferToWav(abuffer) {
        let n = abuffer.numberOfChannels, len = abuffer.length * n * 2 + 44, buf = new ArrayBuffer(len), view = new DataView(buf), pos = 0;
        const set16 = (d) => { view.setInt16(pos, d, true); pos += 2; };
        const set32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
        set32(0x46464952); set32(len - 8); set32(0x45564157); set32(0x20746d66); set32(16); set16(1); set16(n); set32(abuffer.sampleRate); set32(abuffer.sampleRate * n * 2); set16(n * 2); set16(16); set32(0x61746164); set32(len - pos - 4);
        for (let i = 0; i < abuffer.length; i++) { for (let j = 0; j < n; j++) {
            let s = Math.max(-1, Math.min(1, abuffer.getChannelData(j)[i]));
            set16(s < 0 ? s * 0x8000 : s * 0x7FFF);
        }}
        return buf;
    }
</script>
</body>
</html>
