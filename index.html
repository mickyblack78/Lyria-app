<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RED RAIN X200: UNLOCKED</title>
    <style>
        body { background: #050000; color: #ff3333; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        .studio { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }
        
        /* Display & Needle */
        #display { font-size: 14px; height: 30px; text-align: center; color: #fff; border-bottom: 1px solid #400; letter-spacing: 1px; }
        .timeline-container { flex-grow: 1; position: relative; background: #0a0000; border: 2px solid #300; overflow-x: auto; overflow-y: hidden; margin: 10px 0; }
        #playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 500; pointer-events: none; left: 0; box-shadow: 0 0 10px #fff; }

        /* Lanes & Clips */
        .lane { height: 120px; position: relative; width: 10000px; border-bottom: 1px solid #200; background: linear-gradient(90deg, #110000 1px, transparent 1px); background-size: 20px 100%; }
        .clip { position: absolute; height: 80px; top: 20px; background: rgba(255, 0, 0, 0.2); border: 1px solid #f00; color: #fff; font-size: 10px; padding: 5px; cursor: grab; z-index: 10; overflow: hidden; white-space: nowrap; }
        .clip.active { border: 2px solid #ff0; box-shadow: 0 0 15px rgba(255,255,0,0.4); }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; height: 100%; width: 100%; }

        /* Controls */
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; background: #000; padding: 5px; border: 1px solid #f33; }
        .btn { padding: 12px 5px; background: #1a0000; color: #f33; border: 1px solid #500; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .btn:active { background: #f33; color: #000; }
        .vol-box { grid-column: span 2; display: flex; align-items: center; justify-content: space-around; background: #111; border: 1px solid #333; }
        input[type=range] { accent-color: #f33; width: 70%; }
    </style>
</head>
<body>

<div class="studio">
    <div id="display">X200 READY // TOUCH TRACK TO DRAG</div>
    
    <div class="timeline-container" id="timeline" onclick="seek(event)">
        <div id="playhead"></div>
        <div class="lane" id="lane1"></div>
        <div class="lane" id="lane2"></div>
        <div class="lane" id="lane3" style="background:#000"><video id="v-monitor" style="height:100%;" muted></video></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="document.getElementById('f-audio').click()">+ AUDIO</button>
        <button class="btn" onclick="document.getElementById('f-video').click()">+ VIDEO</button>
        <button class="btn" onclick="togglePlay()" id="play-btn">PLAY</button>
        <button class="btn" onclick="stopAll()">STOP</button>
        
        <div class="vol-box">L1 <input type="range" id="vol1" min="0" max="1" step="0.01" value="0.8" oninput="updateVol(1)"></div>
        <div class="vol-box">L2 <input type="range" id="vol2" min="0" max="1" step="0.01" value="0.8" oninput="updateVol(2)"></div>
        
        <button class="btn" onclick="exportMix()">EXPORT</button>
        <button class="btn" style="color:#ff0" onclick="setBracket()">BRACKET</button>
        <button class="btn" onclick="copyAction()">COPY</button>
        <button class="btn" onclick="location.reload()">RESET</button>
    </div>

    <input type="file" id="f-audio" hidden accept="audio/*" onchange="handleFile(event, 'audio')">
    <input type="file" id="f-video" hidden accept="video/*" onchange="handleFile(event, 'video')">
</div>

<script>
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const pxPerSec = 20;
    let state = { playing: false, startAt: 0, offsetTime: 0, tracks: [], vTrack: null };
    let gains = { 1: actx.createGain(), 2: actx.createGain() };
    gains[1].connect(actx.destination); gains[2].connect(actx.destination);

    function handleFile(e, type) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (res) => {
            if (type === 'audio') {
                const buffer = await actx.decodeAudioData(res.target.result);
                createClip(buffer, file.name);
            } else {
                const v = document.getElementById('v-monitor');
                v.src = URL.createObjectURL(file);
                document.getElementById('display').innerText = "VIDEO LOADED";
            }
        };
        type === 'audio' ? reader.readAsArrayBuffer(file) : reader.readAsDataURL(file);
    }

    function createClip(buffer, name) {
        const laneNum = state.tracks.length < 1 ? 1 : 2;
        const clip = { id: Date.now(), buffer, offset: laneNum === 2 ? 26 : 0, lane: laneNum, duration: buffer.duration };
        state.tracks.push(clip);
        renderClip(clip);
    }

    function renderClip(clip) {
        const div = document.createElement('div');
        div.className = 'clip';
        div.id = `clip-${clip.id}`;
        div.innerText = clip.name || "TRACK";
        div.style.width = (clip.duration * pxPerSec) + "px";
        div.style.left = (clip.offset * pxPerSec) + "px";
        
        // Drag Logic
        let startX = 0;
        div.ontouchstart = (e) => {
            startX = e.touches[0].clientX - div.offsetLeft;
            div.classList.add('active');
        };
        div.ontouchmove = (e) => {
            let newX = e.touches[0].clientX - startX;
            newX = Math.max(0, newX);
            div.style.left = newX + "px";
            clip.offset = newX / pxPerSec;
            document.getElementById('display').innerText = `POS: ${clip.offset.toFixed(2)}s`;
        };
        div.ontouchend = () => div.classList.remove('active');

        const canv = document.createElement('canvas');
        div.appendChild(canv);
        document.getElementById(`lane${clip.lane}`).appendChild(div);
        drawWave(clip.buffer, canv);
    }

    function drawWave(buffer, canvas) {
        const ctx = canvas.getContext('2d');
        const data = buffer.getChannelData(0);
        const step = Math.ceil(data.length / 500);
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        for(let i=0; i<500; i++) {
            let val = data[i*step];
            ctx.fillRect(i*(canvas.width/500), 40, 1, val*40);
        }
    }

    function togglePlay() {
        if (state.playing) { stopAll(); return; }
        state.playing = true;
        state.offsetTime = actx.currentTime;
        const video = document.getElementById('v-monitor');
        if (video.src) { video.currentTime = state.startAt; video.play(); }
        
        state.tracks.forEach(t => {
            t.source = actx.createBufferSource();
            t.source.buffer = t.buffer;
            t.source.connect(gains[t.lane]);
            let playDelay = t.offset - state.startAt;
            if (playDelay < 0) t.source.start(0, Math.abs(playDelay));
            else t.source.start(actx.currentTime + playDelay);
        });
        document.getElementById('play-btn').innerText = "PAUSE";
        requestAnimationFrame(updateNeedle);
    }

    function updateNeedle() {
        if (!state.playing) return;
        let elapsed = (actx.currentTime - state.offsetTime) + state.startAt;
        document.getElementById('playhead').style.left = (elapsed * pxPerSec) + "px";
        requestAnimationFrame(updateNeedle);
    }

    function stopAll() {
        state.playing = false;
        const video = document.getElementById('v-monitor');
        if (video.src) video.pause();
        state.tracks.forEach(t => { if(t.source) t.source.stop(); });
        document.getElementById('play-btn').innerText = "PLAY";
    }

    function updateVol(l) { gains[l].gain.value = document.getElementById(`vol${l}`).value; }

    function seek(e) {
        const rect = document.getElementById('timeline').getBoundingClientRect();
        state.startAt = (e.clientX + document.getElementById('timeline').scrollLeft - rect.left) / pxPerSec;
        if (state.playing) { stopAll(); togglePlay(); }
        else { document.getElementById('playhead').style.left = (state.startAt * pxPerSec) + "px"; }
    }
</script>
</body>
</html>
